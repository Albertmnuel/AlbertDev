<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - AlbertDev</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h1 class="logo">AlbertDev</h1>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO HEADER -->
    <section class="hero small-hero">
        <h1>Contact Us</h1>
        <p>Let’s build something amazing together.</p>
    </section>

    <!-- CONTACT CARD -->
    <div class="container">
        <div class="card" style="width: 500px; max-width: 95%;">

            <p class="contact-note">
                We'd love to hear from you! Send us a message or reach out directly below.
            </p>

            <div class="contact-info">
                <p><strong><i class="fas fa-phone"></i> Phone:</strong> 
                    <a href="tel:+2348028577412">+234 8028577412</a>
                </p>

                <p><strong><i class="fas fa-envelope"></i> Email:</strong> 
                    <a href="mailto:albertdev981@email.com">albertdev@email.com</a>
                </p>
            </div>

            <!-- Contact Form -->
            <form id="contactForm" class="contact-form" action="https://formspree.io/f/maqdkdrg" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>

            <p id="successMessage" class="success-message"></p>

        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <h2>AlbertDev</h2>
            <p>© 2026 AlbertDev. All rights reserved.</p>
        </div>
    </footer>

    <!-- FORMSPREE JAVASCRIPT -->
    <script>
        const form = document.getElementById("contactForm");
        const successMessage = document.getElementById("successMessage");

        form.addEventListener("submit", function(e) {
            e.preventDefault(); // prevent page reload

            const data = new FormData(form);

            fetch(form.action, {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if(response.ok) {
                    successMessage.textContent = "✅ Thank you! Your message has been sent.";
                    successMessage.style.display = "block";
                    form.reset();
                } else {
                    successMessage.textContent = "⚠️ Oops! Something went wrong. Try again.";
                    successMessage.style.display = "block";
                }
            })
            .catch(() => {
                successMessage.textContent = "⚠️ Oops! Something went wrong. Try again.";
                successMessage.style.display = "block";
            });
        });
    </script>

</body>

</html>
